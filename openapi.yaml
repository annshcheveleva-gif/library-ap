openapi: 3.0.0

info:
  title: Library API
  version: 1.0.0
  description: Simple REST API for managing books and authors

servers:
  - url: https://example.com/api

paths:
  /books:
    get:
      summary: Get all books
      responses:
        '200':
          description: List of books

    post:
      summary: Create a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
      responses:
        '201':
          description: Book created

  /books/{id}:
    get:
      summary: Get book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Book found
        '404':
          description: Book not found

    delete:
      summary: Delete book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Book deleted
        '404':
          description: Book not found

  /authors:
    get:
      summary: Get all authors
      responses:
        '200':
          description: List of authors

components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        year:
          type: integer

    Author:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string